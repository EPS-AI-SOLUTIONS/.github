# Minimal cargo-deny config for the smoke fixture. We accept anything since
# the fake consumer pulls zero deps; this file exists only so `cargo deny check`
# does not error on missing config.

[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"

[bans]
multiple-versions = "allow"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
