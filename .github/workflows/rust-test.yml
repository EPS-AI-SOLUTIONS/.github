name: Reusable - Rust Test (nextest + clippy + cargo-deny)

on:
  workflow_call:
    inputs:
      rust-version:
        required: false
        type: string
        default: "1.95.0"
      features:
        description: 'Cargo features flag (default: --all-features)'
        type: string
        required: false
        default: '--all-features'
      crate-path:
        description: 'Subdir of caller repo containing Cargo.toml (default: . — root)'
        type: string
        required: false
        default: '.'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.crate-path }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: clippy, rustfmt

      - uses: taiki-e/install-action@920ab1831fbf4fb3ef75c8ead83556c918bb7290  # v2
        with:
          tool: cargo-nextest@0.9, cargo-deny@0.17

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (nextest)
        run: cargo nextest run ${{ inputs.features }} --no-fail-fast
        # env block removed (B1237-T9 review C6): sccache GHA backend disabled per B1232-N7

      - name: Doc test
        run: cargo test --doc --all-features

      - name: Supply chain (cargo-deny)
        run: cargo deny check
