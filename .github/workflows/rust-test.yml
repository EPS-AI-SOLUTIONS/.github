name: Reusable - Rust Test (nextest + clippy + cargo-deny)

on:
  workflow_call:
    inputs:
      rust-version:
        required: false
        type: string
        default: "1.95.0"
      features:
        description: 'Cargo features flag (default: --all-features)'
        type: string
        required: false
        default: '--all-features'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-version }}
          components: clippy, rustfmt

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9, cargo-deny@0.17

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (nextest)
        run: cargo nextest run ${{ inputs.features }} --no-fail-fast
        # env block removed (B1237-T9 review C6): sccache GHA backend disabled per B1232-N7

      - name: Doc test
        run: cargo test --doc --all-features

      - name: Supply chain (cargo-deny)
        run: cargo deny check
