name: Reusable - TypeScript Test (biome + vitest + storybook)

on:
  workflow_call:
    secrets:
      CHROMATIC_PROJECT_TOKEN:
        required: false
      JSP_VAULT_DELEGATE_TOKEN:
        required: false
    inputs:
      bun-version:
        required: false
        type: string
        default: "1.3.12"
      run-storybook:
        required: false
        type: boolean
        default: false
      run-chromatic:
        description: 'Run Chromatic visual regression (requires CHROMATIC_PROJECT_TOKEN secret)'
        required: false
        type: boolean
        default: false
      package-path:
        description: 'Subdir of caller repo containing package.json (default: . — root)'
        type: string
        required: false
        default: '.'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read   # GITHUB_TOKEN must be able to pull @eps-ai-solutions/* deps from GitHub Packages
    defaults:
      run:
        working-directory: ${{ inputs.package-path }}
    # GitHub Packages auth for `bun install` — the consumer `.npmrc` references
    # `${GH_PAT_READ_PACKAGES}` (and some `${NODE_AUTH_TOKEN}`); bun reads .npmrc
    # directly and interpolates these from the process env. No manual PAT needed:
    # the org `default_workflow_permissions` is `write`, so the caller's
    # GITHUB_TOKEN already carries `packages:` scope; this job re-declares
    # `packages: read` so the narrowed `permissions:` block above doesn't drop it.
    env:
      GH_PAT_READ_PACKAGES: ${{ secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: ${{ inputs.run-chromatic && 0 || 1 }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Install deps (frozen)
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bunx biome check --reporter github

      - name: Type check
        run: bunx tsc --noEmit

      # Operator setup -- consumer package.json must define
      # ===================================================
      #   "scripts": {
      #     "test:coverage": "vitest run --coverage"
      #   }
      # This workflow invokes `bun run test:coverage` -- Bun's native test runner
      # does NOT load vitest config (no jsdom env), causing ReferenceError on
      # DOM-dependent tests. Vitest is invoked via the npm script.
      - name: Unit tests (vitest)
        run: bun run test:coverage

      - name: Build Storybook
        if: inputs.run-storybook == true
        run: bun run build-storybook

      - name: Verify Chromatic token (when enabled)
        if: ${{ inputs.run-chromatic }}
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ -z "$CHROMATIC_PROJECT_TOKEN" ]; then
            echo "::error::run-chromatic=true but CHROMATIC_PROJECT_TOKEN secret is not provided"
            exit 1
          fi

      - name: Chromatic visual regression
        if: inputs.run-chromatic == true
        uses: chromaui/action@7aca53e7aa87489020a97f633c1e7e82c12e5973  # v17.0.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          workingDir: ${{ inputs.package-path }}
