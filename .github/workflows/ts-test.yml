name: Reusable - TypeScript Test (biome + vitest + storybook)

on:
  workflow_call:
    secrets:
      CHROMATIC_PROJECT_TOKEN:
        required: false
      JSP_VAULT_DELEGATE_TOKEN:
        required: false
    inputs:
      bun-version:
        required: false
        type: string
        default: "1.3.12"
      run-storybook:
        required: false
        type: boolean
        default: false
      run-chromatic:
        description: 'Run Chromatic visual regression (requires CHROMATIC_PROJECT_TOKEN secret)'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.run-chromatic && 0 || 1 }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Install deps (frozen)
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bunx biome check --reporter github

      - name: Type check
        run: bunx tsc --noEmit

      - name: Unit tests (vitest)
        run: bun test --coverage

      - name: Build Storybook
        if: inputs.run-storybook == true
        run: bun run build-storybook

      - name: Verify Chromatic token (when enabled)
        if: ${{ inputs.run-chromatic }}
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ -z "$CHROMATIC_PROJECT_TOKEN" ]; then
            echo "::error::run-chromatic=true but CHROMATIC_PROJECT_TOKEN secret is not provided"
            exit 1
          fi

      - name: Chromatic visual regression
        if: inputs.run-chromatic == true
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
