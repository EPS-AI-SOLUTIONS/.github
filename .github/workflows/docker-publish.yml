# Operator setup notes
# ====================
# This reusable workflow accepts a `build-args` input and a `KELLNR_TOKEN`
# secret. Apps depending on private crates from kellnr-jaskier.fly.dev
# must:
#   1. In their caller workflow, declare:
#      jobs.publish.with.build-args: |
#        SOME_OTHER_ARG=value
#      jobs.publish.secrets:
#        KELLNR_TOKEN: ${{ secrets.KELLNR_TOKEN }}
#   2. In their Dockerfile, ARG KELLNR_TOKEN at the top of the build stage
#      and pass to cargo via .cargo/config.toml or env
#      CARGO_REGISTRIES_KELLNR_JASKIER_TOKEN
#
# Apps without private deps need no caller-side changes - the secret defaults
# to empty.
#
# Accepted tag formats (validated by step "Validate semver tag"):
#   semver:   v1.0.0, v1.2.3, v0.1.0-rc1, v2.0.0-alpha.5
#   PEP 440:  v0.0.1a1, v1.0.0b2, v0.0.1rc1, v1.0.0.dev0
# Rejected:   v1.0 (missing patch), v1.0.0.0 (4 segments), release-2026

name: Reusable - Docker Publish to ghcr.io

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      platforms:
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      build-args:
        description: 'Multi-line build-args (KEY=VALUE per line) - passed to docker buildx build --build-arg'
        required: false
        type: string
        default: ''
      context:
        description: 'Docker build context dir (subdir of caller repo; default: . — root). Dockerfile resolves relative to this dir unless overridden.'
        required: false
        type: string
        default: '.'
    secrets:
      KELLNR_TOKEN:
        description: 'Kellnr publish/read token for cargo fetch from private registry'
        required: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Validate semver tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Accepts both semver pre-release (v0.1.0-rc1) and PEP 440 (v0.0.1a1, v1.0.0.dev0).
          # Suffix (if present) starts with optional dot/dash + a letter, so v1.0.0.0
          # (pure 4-segment numeric) is rejected. See operator notes at top of file.
          echo "${{ github.ref_name }}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([.-]?[a-zA-Z][a-zA-Z0-9.-]*)?$' \
            || (echo "::error::Tag must match semver (v<major>.<minor>.<patch>[-pre]) or PEP 440 (v<M>.<m>.<p>{a|b|rc|.dev}<N>)" && exit 1)

      # TODO(B1237-T8): replace QEMU emulation with a build matrix using native
      # ubuntu-24.04-arm runners (5-10x faster than QEMU). The restructure
      # requires splitting build per-arch + merging manifests with
      # docker/build-push-action's native manifest support; deferred until
      # we're ready for the workflow refactor.
      # See: https://github.blog/changelog/2025-01-16-linux-arm64-hosted-runners-now-available-for-free-in-public-repositories/
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags (release tag or SHA)
        id: tags
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "tags=ghcr.io/eps-ai-solutions/${{ inputs.image-name }}:${VERSION},ghcr.io/eps-ai-solutions/${{ inputs.image-name }}:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=ghcr.io/eps-ai-solutions/${{ inputs.image-name }}:sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: ${{ inputs.context }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # build-args: caller-supplied lines first, then KELLNR_TOKEN appended.
          # When the secret isn't set, KELLNR_TOKEN= (empty) is passed - harmless
          # for consumers without private deps. Consumers WITH private deps must
          # declare the secret in their caller workflow's `secrets:` block.
          build-args: |
            ${{ inputs.build-args }}
            KELLNR_TOKEN=${{ secrets.KELLNR_TOKEN }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
