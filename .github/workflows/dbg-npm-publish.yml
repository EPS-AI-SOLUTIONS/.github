name: DBG npm-publish
on: workflow_dispatch
permissions:
  contents: read
jobs:
  probe:
    if: ${{ false }}
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      package-name: ts-package-fake
      package-path: tests/fixtures/ts-package-fake
      access: restricted
      provenance: false
    uses: ./.github/workflows/npm-publish.yml
