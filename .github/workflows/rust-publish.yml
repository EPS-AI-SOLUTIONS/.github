# Operator setup notes
# ====================
# This reusable workflow fetches a per-crate Kellnr publish token from the
# JSP Vault delegate API. Apps must:
#   1. In their caller workflow, declare:
#      jobs.publish.secrets:
#        JSP_VAULT_DELEGATE_TOKEN: ${{ secrets.JSP_VAULT_DELEGATE_TOKEN }}
#      OR use `secrets: inherit` (less explicit, broader scope).
#   2. Have a vault entry at kellnr/publish_tokens/<crate-name> in the
#      eps-ai-solutions namespace.
#
# Note (B1237-G6 audit, F7-analogous fix): reusable workflows do NOT auto-
# inherit caller secrets unless explicitly declared in workflow_call.secrets
# (or caller uses `secrets: inherit`). Without this declaration the
# `secrets.JSP_VAULT_DELEGATE_TOKEN` reference below silently expanded to
# empty, causing Vault 401 / cargo publish failures with no clear root cause.

name: Reusable - Rust Publish to Kellnr

on:
  workflow_call:
    inputs:
      crate-name:
        required: true
        type: string
      rust-version:
        required: false
        type: string
        default: "1.95.0"
      crate-path:
        description: 'Subdir of caller repo containing Cargo.toml (default: . — root)'
        type: string
        required: false
        default: '.'
    secrets:
      JSP_VAULT_DELEGATE_TOKEN:
        description: 'Bearer token for jsp-fusion vault delegate API (kellnr/publish_tokens/<crate>)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      # id-token: write  removed (B1237-T6 review C3): re-enable when Kellnr OIDC RFC 3403 lands
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Fetch Kellnr publish token from Vault
        id: vault
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsS --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.JSP_VAULT_DELEGATE_TOKEN }}" \
            "https://jsp-fusion.fly.dev/api/v1/vault/get?key=kellnr/publish_tokens/${{ inputs.crate-name }}&namespace=eps-ai-solutions") \
            || { echo "::error::Vault fetch failed for kellnr/publish_tokens/${{ inputs.crate-name }}"; exit 1; }
          TOKEN=$(echo "$RESPONSE" | jq -er .value) \
            || { echo "::error::Vault response missing .value field for ${{ inputs.crate-name }}"; exit 1; }
          if [[ "$TOKEN" == "null" || -z "$TOKEN" ]]; then
            echo "::error::Vault returned null/empty token for ${{ inputs.crate-name }}"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: cargo publish to Kellnr
        working-directory: ${{ inputs.crate-path }}
        env:
          CARGO_REGISTRIES_KELLNR_INDEX: "sparse+https://kellnr-jaskier.fly.dev/api/v1/crates/"
          CARGO_REGISTRIES_KELLNR_TOKEN: ${{ steps.vault.outputs.token }}
        run: cargo publish --registry kellnr --no-verify --allow-dirty  # Bug 42: Cargo.lock updated by sparse index fetch
