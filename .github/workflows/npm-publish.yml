# Operator setup notes
# ====================
# This reusable workflow publishes to the GitHub Packages npm registry
# (npm.pkg.github.com). GitHub Packages has NO "trusted publishers"
# feature -- that is an npmjs.org concept. For GHP, publish auth is the
# built-in ${{ secrets.GITHUB_TOKEN }} with `packages: write` permission
# (already declared on the `publish` job below); there is NOTHING to
# register manually. The `id-token: write` permission is kept only so
# `npm publish --provenance` can mint a provenance attestation when a
# caller opts into `with.provenance: true` + `with.access: public`.
# Before the first call from a consumer repo:
#   1. Verify the caller workflow grants `permissions: { contents: read,
#      packages: write }` (and `id-token: write` only if it opts into
#      provenance) -- inherited perms do not flow into a reusable workflow.
#   2. Verify the @eps-ai-solutions npm scope exists / the package name
#      is `@eps-ai-solutions/<pkg>` (GHP requires scope == owning org).
#   3. Cross-repo private deps: a CONSUMING repo can only `bun install`
#      another org's PRIVATE GHP package if that repo is granted Actions
#      read-access to the package (Package settings -> Manage Actions
#      access) OR the package visibility is set to "internal". GITHUB_TOKEN
#      alone does not bridge two private repos.
# See docs/book/src/raporty/B1240-FU-testing-devdep-flip.md (and the
# B1240 OIDC / trusted-publishing audit) for the full rationale.
#
# Notes on npm version (B1237-T18 A3):
#   - Node 22 hosted runners ship npm 10.9.0, which already supports
#     `--provenance` via OIDC (added in npm 9.5+). No upgrade required.
#   - Removed `npm install -g npm@latest` self-upgrade step that was
#     crashing on Node 22.22.2 toolcache with MODULE_NOT_FOUND
#     'promise-retry'. The earlier upgrade was based on outdated docs.
#
# Operator setup -- npm provenance vs restricted scope (B1237-T18 G3)
# ===================================================================
# npm CLI rejects --provenance with --access restricted for private/new
# packages (EUSAGE: "Can't generate provenance for new or private package").
# Default behaviour: provenance OFF, access restricted (private package on GHP).
# To opt-in for public + provenance: caller must set with.provenance: true
# AND with.access: public. The workflow validates this combo.
name: Reusable - NPM Publish to GHP (OIDC)

on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "22"
      access:
        description: "npm publish --access value (public | restricted)"
        required: false
        type: string
        default: "restricted"
      provenance:
        description: "Generate provenance attestation (requires access: public per npm policy; default false for restricted scope)"
        required: false
        type: boolean
        default: false
      package-path:
        description: 'Subdir of caller repo containing package.json (default: . — root)'
        type: string
        required: false
        default: '.'

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write   # MANDATORY for OIDC trusted publishing (npm GA 2025-07-31)
    defaults:
      run:
        working-directory: ${{ inputs.package-path }}
    # `bun install --frozen-lockfile` below needs GitHub Packages auth to resolve
    # any `@eps-ai-solutions/*` deps. The consumer `.npmrc` references
    # `${GH_PAT_READ_PACKAGES}` / `${NODE_AUTH_TOKEN}`; export both from the
    # built-in GITHUB_TOKEN. `packages: write` (above) already grants read; the
    # `setup-node` step also wires NODE_AUTH_TOKEN for the publish step itself.
    env:
      GH_PAT_READ_PACKAGES: ${{ secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: "https://npm.pkg.github.com"
          scope: "@eps-ai-solutions"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify dist parity
        # Catches the dist-vs-raw drift class fixed in B1240 (core/auth/state/wasm-worker):
        #   - exports / main / module / types subpath targets that don't exist in dist/
        #   - relative import/export specifiers in dist/*.js missing a .js/.mjs/.cjs ext
        #     (Node ESM "Cannot find module" / "Directory import not supported") or
        #     carrying a literal .ts extension (tsc allowImportingTsExtensions leak)
        #   - missing .d.ts beside a .js when "declaration": true
        #   - empty `files` allow-list (npm pack --dry-run)
        run: |
          set -euo pipefail
          node ./scripts/verify-dist-parity.mjs 2>/dev/null || node -e '
            const { readFileSync, existsSync, readdirSync } = require("node:fs");
            const { join } = require("node:path");
            const pkg = JSON.parse(readFileSync("package.json", "utf8"));
            let errors = 0;
            const fail = (m) => { console.error("::error::" + m); errors++; };
            const collect = (v, acc = []) => {
              if (typeof v === "string") { if (v.startsWith("./")) acc.push(v); }
              else if (v && typeof v === "object") for (const k of Object.keys(v)) collect(v[k], acc);
              return acc;
            };
            for (const t of collect(pkg.exports || {})) if (!existsSync(t)) fail("exports target missing: " + t);
            for (const k of ["main", "module", "types"]) if (pkg[k] && !existsSync(pkg[k])) fail(k + " target missing: " + pkg[k]);
            const declOn = existsSync("tsconfig.json") && /"declaration"\s*:\s*true/.test(readFileSync("tsconfig.json", "utf8"));
            const RE = /(?:\bfrom\s+|\bimport\s*\(\s*)(["\x27])(\.\.?\/[^"\x27]+?)\1/g;
            const walk = (dir) => {
              if (!existsSync(dir)) return;
              for (const e of readdirSync(dir, { withFileTypes: true })) {
                const p = join(dir, e.name);
                if (e.isDirectory()) { walk(p); continue; }
                if (!e.name.endsWith(".js")) continue;
                const src = readFileSync(p, "utf8");
                let m; RE.lastIndex = 0;
                while ((m = RE.exec(src)) !== null) {
                  const spec = m[2];
                  if (/\.ts$/.test(spec)) fail(p + ": relative specifier with .ts extension: " + spec);
                  else if (!/\.[mc]?js$/.test(spec) && !/\.json$/.test(spec)) fail(p + ": relative specifier missing extension: " + spec);
                }
                if (declOn && !existsSync(p.replace(/\.js$/, ".d.ts"))) fail(p + ": missing .d.ts beside .js");
              }
            };
            walk("dist");
            if (errors) { console.error("verify-dist-parity: " + errors + " error(s)"); process.exit(1); }
            console.log("verify-dist-parity: dist OK");
          '
          PACK_COUNT=$(npm pack --dry-run --json | node -e "let s=\"\";process.stdin.on(\"data\",d=>s+=d).on(\"end\",()=>{const f=(JSON.parse(s)[0].files||[]);if(!f.length){console.error(\"::error::npm pack produced an empty files list\");process.exit(1)}process.stdout.write(String(f.length))})")
          echo "verify-dist-parity: $PACK_COUNT file(s) in tarball"

      - name: Publish to GitHub Packages via OIDC
        run: |
          if [ "${{ inputs.provenance }}" = "true" ]; then
            if [ "${{ inputs.access }}" != "public" ]; then
              echo "::error::provenance: true requires access: public per npm policy (EUSAGE for new/private packages)"
              exit 1
            fi
            npm publish --access "${{ inputs.access }}" --provenance
          else
            npm publish --access "${{ inputs.access }}"
          fi
