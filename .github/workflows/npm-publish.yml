# Operator setup notes
# ====================
# This reusable workflow uses GitHub Packages OIDC trusted publishing.
# Before the first call from a consumer repo:
#   1. Register the consumer repo as a trusted publisher at
#      github.com/orgs/eps-ai-solutions/packages/npm/<package>/settings
#      (Trusted Publishers -> Add publisher -> reusable workflow path)
#   2. Verify id-token: write is set on the CALLER workflow (not just here)
#   3. Verify the @eps-ai-solutions npm scope is provisioned (B1237-T3)
#
# Notes on npm version (B1237-T18 A3):
#   - Node 22 hosted runners ship npm 10.9.0, which already supports
#     `--provenance` via OIDC (added in npm 9.5+). No upgrade required.
#   - Removed `npm install -g npm@latest` self-upgrade step that was
#     crashing on Node 22.22.2 toolcache with MODULE_NOT_FOUND
#     'promise-retry'. The earlier upgrade was based on outdated docs.
#
# Operator setup -- npm provenance vs restricted scope (B1237-T18 G3)
# ===================================================================
# npm CLI rejects --provenance with --access restricted for private/new
# packages (EUSAGE: "Can't generate provenance for new or private package").
# Default behaviour: provenance OFF, access restricted (private package on GHP).
# To opt-in for public + provenance: caller must set with.provenance: true
# AND with.access: public. The workflow validates this combo.
name: Reusable - NPM Publish to GHP (OIDC)

on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "22"
      access:
        description: "npm publish --access value (public | restricted)"
        required: false
        type: string
        default: "restricted"
      provenance:
        description: "Generate provenance attestation (requires access: public per npm policy; default false for restricted scope)"
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write   # MANDATORY for OIDC trusted publishing (npm GA 2025-07-31)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: "https://npm.pkg.github.com"
          scope: "@eps-ai-solutions"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish to GitHub Packages via OIDC
        run: |
          if [ "${{ inputs.provenance }}" = "true" ]; then
            if [ "${{ inputs.access }}" != "public" ]; then
              echo "::error::provenance: true requires access: public per npm policy (EUSAGE for new/private packages)"
              exit 1
            fi
            npm publish --access "${{ inputs.access }}" --provenance
          else
            npm publish --access "${{ inputs.access }}"
          fi
