# Test reusable workflows (weekly integration smoke)
# ===================================================
# Purpose: catch regressions in the 5 org-wide reusable workflows
# (rust-test, rust-publish, npm-publish, docker-publish, ts-test) BEFORE
# they hit real consumer repos. Refs: B1237-FU T13 / I7.
#
# Strategy:
#   - rust-test-smoke + ts-test-smoke + docker-publish-smoke run live every
#     Monday 04:00 UTC and on workflow_dispatch.
#   - rust-publish-smoke + npm-publish-smoke are gated `if: false` because
#     they would push real artefacts to Kellnr / GitHub Packages. Their
#     regression coverage lives in template-validation runs inside the
#     `rust-crate-template`, `rust-app-template`, `ts-package-template`,
#     and `ts-app-template` repos (each template is exercised on every
#     template-repo push).
#
# Path-scoped fixtures (B1237-FU J4):
#   The reusables now accept `crate-path` / `package-path` / `context`
#   inputs (default '.'). Smokes below pass `tests/fixtures/<name>` so
#   the live cargo/bun runs exercise real fixture trees instead of the
#   .github repo root. This catches contract drift (input wiring, secret
#   passing, working-directory propagation) end-to-end.

name: Test reusable workflows (weekly)

on:
  schedule:
    # Mon 04:00 UTC - aligned with the org "off-hours" window so smoke
    # never collides with normal CI traffic on consumer repos.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-reusables-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # rust-test smoke - runs on every schedule tick + manual dispatch.
  # Targets tests/fixtures/rust-fake-consumer/ via `crate-path` (B1237-FU
  # J4). Live cargo nextest + clippy + cargo-deny run against the fixture.
  # ---------------------------------------------------------------------
  rust-test-smoke:
    uses: ./.github/workflows/rust-test.yml
    with:
      crate-path: tests/fixtures/rust-fake-consumer
    secrets:
      JSP_VAULT_DELEGATE_TOKEN: ${{ secrets.JSP_VAULT_DELEGATE_TOKEN }}

  # ---------------------------------------------------------------------
  # ts-test smoke - targets tests/fixtures/ts-fake-consumer/ via
  # `package-path`. Chromatic gated off (no org-level project token).
  # ---------------------------------------------------------------------
  ts-test-smoke:
    uses: ./.github/workflows/ts-test.yml
    with:
      package-path: tests/fixtures/ts-fake-consumer
      run-storybook: false
      run-chromatic: false

  # ---------------------------------------------------------------------
  # docker-publish smoke - real push to ghcr.io with a smoke-only image
  # name so it doesn't collide with consumer images. Skipped on dispatch
  # without a tag to avoid clobbering the `:sha-XXXXXXX` cache.
  # ---------------------------------------------------------------------
  docker-publish-smoke:
    if: false  # TODO B1237-FU: enable once we have a smoke Dockerfile + can pin the cleanup retention. Today this would push test-reusable-smoke:sha-* tags into ghcr.io with no GC.
    uses: ./.github/workflows/docker-publish.yml
    with:
      image-name: test-reusable-smoke
      build-args: ""
    secrets:
      KELLNR_TOKEN: ${{ secrets.KELLNR_TOKEN }}

  # ---------------------------------------------------------------------
  # npm-publish smoke - gated off; covered by template-validation runs
  # in `ts-package-template` (every template push fully exercises npm-
  # publish.yml against a real fake package on a -smoke version branch).
  # ---------------------------------------------------------------------
  npm-publish-smoke:
    if: false
    uses: ./.github/workflows/npm-publish.yml
    with:
      package-name: ts-package-fake
      package-path: tests/fixtures/ts-package-fake
      access: restricted
      provenance: false

  # ---------------------------------------------------------------------
  # rust-publish smoke - gated off; covered by template-validation runs
  # in `rust-crate-template`. Pushing to Kellnr from a smoke test would
  # clobber the registry with throwaway versions.
  # ---------------------------------------------------------------------
  rust-publish-smoke:
    if: false
    uses: ./.github/workflows/rust-publish.yml
    with:
      crate-name: rust-fake-consumer
      crate-path: tests/fixtures/rust-fake-consumer
    secrets:
      JSP_VAULT_DELEGATE_TOKEN: ${{ secrets.JSP_VAULT_DELEGATE_TOKEN }}

  # ---------------------------------------------------------------------
  # YAML / actionlint sanity check on all 5 reusables. Catches schema
  # drift (missing `on:`, undeclared inputs, bad SHA syntax) BEFORE the
  # weekly smoke runs the live calls above.
  # ---------------------------------------------------------------------
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run actionlint over all .github/workflows/*.yml
        run: |
          set -euo pipefail
          bash <(curl -fsSL --max-time 30 https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash)
          ./actionlint -color
